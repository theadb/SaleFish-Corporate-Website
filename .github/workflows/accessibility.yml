name: Accessibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pa11y:
    name: Pa11y WCAG AA scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Pa11y CI and Axe runner
        run: npm install -g pa11y-ci pa11y-ci-runner-axe

      - name: Run accessibility scan
        # SITE_URL must be set as a repository secret, e.g. https://salefish.app
        # Standard (WCAG2AA) and runner (axe) are configured in .pa11yci.json
        run: |
          pa11y-ci \
            --config .pa11yci.json \
            --threshold 0 \
            "${{ secrets.SITE_URL }}/" \
            "${{ secrets.SITE_URL }}/blog/" \
            "${{ secrets.SITE_URL }}/our-story/" \
            "${{ secrets.SITE_URL }}/partners/" \
            "${{ secrets.SITE_URL }}/contact-us/" \
            "${{ secrets.SITE_URL }}/awards/"
