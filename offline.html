<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline — SaleFish</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #452D8C;
      --light-purple: #9D90D3;
      --gold: #EDBB85;
      --gray: #F3F5F9;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--purple);
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    /* Background orb */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 20% 20%, rgba(157,144,211,0.35) 0%, transparent 70%),
        radial-gradient(ellipse 60% 70% at 80% 80%, rgba(69,45,140,0.6) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
      backdrop-filter: blur(12px);
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 32px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg { width: 36px; height: 36px; stroke: var(--gold); }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.75);
      margin-bottom: 40px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: var(--gold);
      color: #2a1a5e;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }

    .logo {
      margin-top: 48px;
      opacity: 0.55;
    }
    .logo img { height: 28px; filter: brightness(0) invert(1); }

    @media (max-width: 500px) {
      .card { padding: 40px 28px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z" />
      </svg>
    </div>

    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your connection.<br>
      Check your internet and try again — we'll be right here when you're back.
    </p>

    <button class="btn" onclick="window.location.reload()">Try Again</button>

    <div class="logo">
      <img src="/wp-content/themes/salefish/img/salefish_logo.png" alt="SaleFish" width="130" height="29">
    </div>
  </div>
</body>
</html>
